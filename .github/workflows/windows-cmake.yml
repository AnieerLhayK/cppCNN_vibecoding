name: Windows CMake CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-cmake-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: MSVC Release
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure CMake
        run: >
          cmake
          -S codex
          -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCPPCNN_BUILD_TESTS=ON
          -DCPPCNN_BUILD_DEMO_GENERATOR=ON
          -DCPPCNN_BUILD_SUBSET_TOOL=ON

      - name: Build Release
        run: cmake --build build --config Release --parallel

      - name: Run CTest
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Smoke test CLI
        run: .\build\Release\cppcnn_app.exe help
