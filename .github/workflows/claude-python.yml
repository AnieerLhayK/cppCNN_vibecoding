name: Claude Python CI

on:
  push:
    branches:
      - main
    paths:
      - "claude/**"
      - "pytest.ini"
      - ".github/workflows/claude-python.yml"
  pull_request:
    branches:
      - main
    paths:
      - "claude/**"
      - "pytest.ini"
      - ".github/workflows/claude-python.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: claude-python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python 3.11 unit tests
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: claude/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r claude/requirements.txt pytest

      - name: Run tests
        run: python -m pytest -q claude/tests
